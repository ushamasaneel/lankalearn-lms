<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LankaLearn LMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<!-- Top Header -->
<header class="top-header">
  <div class="header-left">
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>
    <div class="brand">
      <span class="brand-icon-small">🎓</span>
      <span class="brand-text">LankaLearn</span>
    </div>
    <!-- Breadcrumb / Page Title -->
    <div class="page-title-area">
      <span id="pageTitle" class="page-title"></span>
    </div>
  </div>
  <div class="header-right">
    <div class="header-user" id="headerUser">
      <div class="user-avatar" id="userAvatar"></div>
      <div class="user-info">
        <div class="user-name" id="userName">Loading…</div>
        <div class="user-role" id="userRole"></div>
      </div>
      <div class="user-dropdown" id="userDropdown">
        <div class="dropdown-item" onclick="logout()">🚪 Sign Out</div>
      </div>
    </div>
  </div>
</header>

<!-- Layout -->
<div class="app-layout">

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section" id="sidebarNav">
      <!-- Populated by JS based on role -->
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <div id="contentArea">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading…</p>
      </div>
    </div>
  </main>

</div>

<!-- Global Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal-box" id="modalBox" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modalTitle">Modal</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script src="/static/utils.js?v=2"></script>
<script src="/static/app.js?v=2"></script>
<script src="/static/admin.js?v=2"></script>
<script src="/static/teacher.js?v=2"></script>
<script src="/static/student.js?v=2"></script>
</body>
</html>
